# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.8
  # 版权年份
  copyrightYear: 2024
  # 文件路径（trong container; đã mount volume "uploads" ở docker-compose）
  profile: /home/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # demo 开关
  demoEnabled: false


# 开发环境配置
server:
  # 服务器的HTTP端口（LƯU Ý: cổng thực do PORT env quyết định = 3000, giá trị này không dùng）
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    accept-count: 1000
    threads:
      max: 800
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# nest配置
nest:
  # 资源信息
  messages:
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      enabled: true
  # redis 配置
  redis:
    host: redis           # service name trong docker-compose (KHÔNG phải 127.0.0.1)
    port: 6379
    database: 0
    password:             # để trống vì Redis container không đặt mật khẩu
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# token配置
token:
  header: Authorization
  # LƯU Ý BẢO MẬT: đổi thành chuỗi ngẫu nhiên mạnh trước khi dùng thật
  secret: change-me-to-a-strong-random-secret-please
  expireTime: 30

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  enabled: true
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*
